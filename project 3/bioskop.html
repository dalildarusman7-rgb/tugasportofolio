<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ticketing Bioskop Online</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3c3c5c);
      color: #fff;
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
      padding: 20px;
      background: #ff4757;
    }
    header h1 {
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: 30px auto;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: none;
    }
    button {
      margin-top: 15px;
      padding: 10px 15px;
      background: #ff4757;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #e84118;
    }
    .ticket {
      margin-top: 20px;
      padding: 15px;
      background: #2f3542;
      border-radius: 8px;
    }
    .ticket h2 {
      margin-top: 0;
      color: #ffa502;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎬 Ticketing Bioskop Online</h1>
  </header>
  <div class="container">
    <form id="ticketForm">
      <label>Nama Pembeli:</label>
      <input type="text" id="nama" required>

      <label>Pilih Film:</label>
      <select id="film">
        <option value="Avengers: Endgame">Avengers: Endgame</option>
        <option value="Spiderman: No Way Home">Spiderman: No Way Home</option>
        <option value="The Batman">The Batman</option>
      </select>

      <label>Jumlah Tiket:</label>
      <input type="number" id="jumlah" min="1" value="1" required>

      <label>Kelas:</label>
      <select id="kelas">
        <option value="Reguler">Reguler - Rp50.000</option>
        <option value="VIP">VIP - Rp100.000</option>
      </select>

      <button type="button" onclick="proses()">Pesan Tiket</button>
      <button type="reset">Reset</button>
    </form>

    <div class="ticket" id="output" style="display:none;">
      <h2>🎟 Struk Tiket</h2>
      <p id="detail"></p>
    </div>
  </div>

  <script>
    function proses() {
      const nama = document.getElementById("nama").value;
      const film = document.getElementById("film").value;
      const jumlah = parseInt(document.getElementById("jumlah").value);
      const kelas = document.getElementById("kelas").value;

      let harga = kelas === "VIP" ? 100000 : 50000;
      let total = harga * jumlah;

      // Diskon: beli >=3 tiket dapat potongan 10%
      let diskon = 0;
      if (jumlah >= 3) {
        diskon = total * 0.1;
        total -= diskon;
      }

      const detail = `
        Nama: ${nama}<br>
        Film: ${film}<br>
        Kelas: ${kelas}<br>
        Jumlah Tiket: ${jumlah}<br>
        Diskon: Rp${diskon}<br>
        Total Bayar: Rp${total}
      `;

      document.getElementById("detail").innerHTML = detail;
      document.getElementById("output").style.display = "block";
    }
  </script>
</body>
</html>
