<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Cuaca Mobile</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }
    .weather-card {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 30px;
      width: 300px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .weather-card h2 {
      margin: 0;
      font-size: 24px;
    }
    .weather-icon {
      font-size: 60px;
      margin: 20px 0;
    }
    .temp {
      font-size: 40px;
      font-weight: bold;
    }
    select, button {
      margin-top: 15px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }
    button {
      background: #ff9800;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="weather-card">
    <h2 id="city-name">Pilih Kota</h2>
    <div class="weather-icon" id="icon">🌤️</div>
    <div class="temp" id="temp">-- °C</div>
    <div id="desc">Belum ada data</div>
    <select id="city">
      <option value="">-- Pilih Kota --</option>
      <option value="Jakarta">Jakarta</option>
      <option value="Serang">Serang</option>
    </select>
    <button onclick="getWeather()">Cek Cuaca</button>
  </div>

  <script>
    function getWeather() {
      const city = document.getElementById('city').value;
      const cityName = document.getElementById('city-name');
      const icon = document.getElementById('icon');
      const temp = document.getElementById('temp');
      const desc = document.getElementById('desc');

      if(city === "") {
        cityName.innerText = "Pilih Kota";
        temp.innerText = "-- °C";
        desc.innerText = "⚠️ Silakan pilih kota.";
        icon.innerText = "❓";
        return;
      }

      // Data cuaca statis
      const weatherData = {
        "Jakarta": {temp: "30°C", desc: "Cerah", icon: "☀️"},
        "Serang": {temp: "28°C", desc: "Berawan", icon: "☁️"}
      };

      cityName.innerText = city;
      temp.innerText = weatherData[city].temp;
      desc.innerText = weatherData[city].desc;
      icon.innerText = weatherData[city].icon;
    }
  </script>
</body>
</html>
